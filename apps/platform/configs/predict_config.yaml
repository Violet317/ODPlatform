# ============================================================
#  predict_后处理
# ============================================================
# 单张图像最大检测框数
# 示例: 100, 300, 1000
# 范围: 最小值: 1
max_det: 300

# ============================================================
#  predict_展示
# ============================================================
# 结果图像上是否显示标签
# 示例: true, false
show_labels: true
# 结果图像上是否显示置信度
# 示例: true, false
show_conf: true

# ============================================================
#  predict_输入
# ============================================================
# 推理图像来源（路径或摄像头 ID）
# 示例: data/test/images, 0, path/to/video.mp4
# 建议: 摄像头用 '0' 表示第一个摄像头
source: ''

# ============================================================
#  predict_输出
# ============================================================
# 是否保存结果为 TXT 标签
# 示例: true, false
save_txt: false
# 保存结果时是否包含置信度
# 示例: true, false
save_conf: false
# 是否裁剪并保存每个检测目标
# 示例: true, false
save_crop: false


# ============================================================
#  常见问题
# ============================================================
# Q: 编辑后如何验证？
# A: odp-config validate --config 此文件路径
#
# Q: 如何生成其他任务的模板？
# A: odp-config generate --task val   (验证)
#    odp-config generate --task predict (推理)
#
# Q: 如何恢复默认值？
# A: 删除对应字段行，系统会用代码默认值
# ============================================================
